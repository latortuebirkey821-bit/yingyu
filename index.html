<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍩 哆啦A梦 · 单词乐园 🍩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #b1d4f0 0%, #d9ecff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Patrick Hand', 'Yuanti SC', cursive, sans-serif;
            padding: 12px;
        }

        /* 主卡片 - 更宽以适应横版 */
        .homepage {
            max-width: 1400px;
            width: 100%;
            background-color: #e8f3ff;
            border-radius: 70px 70px 45px 45px;
            box-shadow: 0 20px 0 #5a8cbf, 0 25px 30px #7da2c4;
            border: 5px solid white;
            padding: 1.5rem 1.5rem 1.8rem;
            position: relative;
        }

        /* 哆啦A梦装饰 */
        .homepage::before {
            content: "🔔";
            font-size: 3rem;
            position: absolute;
            top: 10px;
            right: 30px;
            opacity: 0.3;
            transform: rotate(15deg);
            z-index: 1;
        }

        /* 头部 */
        .title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 5;
        }

        .title-block {
            background: #c2e0ff;
            border-radius: 70px;
            padding: 0.3rem 2rem 0.6rem 2rem;
            box-shadow: 0 8px 0 #3f7ab3, 0 8px 15px #9ac0e5;
            border: 4px solid white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-block h1 {
            font-size: 2.8rem;
            color: #104e8b;
            text-shadow: 3px 3px 0 #aad0ff;
        }

        .dora-icon {
            font-size: 3rem;
            background: #f9d71c;
            border-radius: 50%;
            padding: 0.4rem 0.7rem 0.2rem 0.7rem;
            box-shadow: 0 6px 0 #b0891a, 0 0 0 4px white;
        }

        /* 选择你的冒险 - 更紧凑 */
        .choose-line {
            background: #c9e3ff;
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            margin: 0.5rem 0 1rem;
            border: 4px dashed #0070c0;
            box-shadow: 0 5px 0 #528ac9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .choose-line p {
            font-size: 1.8rem;
            color: #014182;
            background: white;
            border-radius: 40px;
            padding: 0.2rem 1.5rem;
            border: 3px solid #0070c0;
        }

        .dora-bell {
            font-size: 1.8rem;
            background: #ffe18a;
            border-radius: 40px;
            padding: 0.2rem 1.5rem;
            border: 3px solid white;
            color: #5a2e00;
            box-shadow: 0 4px 0 #d6a10b;
        }

        /* 类别选择 - 更紧凑 */
        .category-wrap {
            background: #b8d9f5;
            border-radius: 50px;
            padding: 0.6rem 1rem;
            border: 4px solid white;
            margin: 0.8rem 0;
        }

        .section-label {
            font-size: 1.6rem;
            color: #003b6f;
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }

        .category-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.7rem;
            justify-content: center;
        }

        .cat-item {
            background: #ffffff;
            font-size: 1.4rem;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 3px solid #007acc;
            color: #014a81;
            box-shadow: 0 4px 0 #3f78b3;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .cat-item.selected {
            background: #f9d71c;
            border-color: white;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b0891a;
        }

        /* 横版游戏区域 - 三个游戏并排 */
        .games-row {
            display: flex;
            gap: 1.2rem;
            margin: 1.2rem 0 0.8rem;
            min-height: 380px;
        }

        /* 每个游戏卡片 */
        .game-col {
            flex: 1;
            background: white;
            border-radius: 40px 40px 30px 30px;
            border: 4px solid #0070c0;
            padding: 1rem 0.8rem 1rem;
            box-shadow: 0 10px 0 #3d74a8, inset 0 -2px 0 #3d74a8;
            display: flex;
            flex-direction: column;
        }

        .game-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.8rem;
            padding: 0 0.5rem;
        }

        .game-icon {
            font-size: 2rem;
            background: #ffb6d1;
            border-radius: 50%;
            padding: 0.4rem;
            border: 3px solid white;
            box-shadow: 0 4px 0 #b0265a;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-title {
            font-size: 1.6rem;
            color: #0b3f6b;
            background: #b2d9ff;
            padding: 0.2rem 1rem 0.4rem;
            border-radius: 30px;
            border: 3px solid white;
        }

        /* 单词卡片游戏 - 横版缩小版 */
        .flashcard-col .big-card {
            background: #e8f3ff;
            border-radius: 35px;
            padding: 1rem 0.5rem;
            border: 4px solid white;
            box-shadow: 0 8px 0 #3d74a8;
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .flashcard-col .word-display {
            font-size: 3rem;
            color: #104e8b;
            text-shadow: 2px 2px 0 #aad0ff;
        }

        .flashcard-col .phonetic-hint {
            font-size: 1.4rem;
            color: #014182;
            background: #ecf7ff;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            border: 2px solid #0070c0;
            margin: 0.3rem 0;
        }

        .flashcard-col .speak-btn {
            background: #ffb6d1;
            border: 3px solid white;
            font-size: 1.4rem;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            color: #b0265a;
            box-shadow: 0 4px 0 #b0265a;
            cursor: pointer;
            margin: 0.3rem 0;
        }

        .flashcard-col .nav-buttons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
        }

        .flashcard-col .nav-btn {
            background: #ffe18a;
            border: 3px solid white;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 1.3rem;
            color: #5a2e00;
            box-shadow: 0 4px 0 #d6a10b;
            cursor: pointer;
            flex: 1;
            text-align: center;
        }

        /* 测验模式 - 横版缩小版 */
        .quiz-col .question-box {
            background: #e8f3ff;
            border-radius: 35px;
            padding: 1rem 0.5rem;
            border: 4px solid white;
            box-shadow: 0 8px 0 #3d74a8;
            margin-bottom: 0.8rem;
            text-align: center;
        }

        .quiz-col .question-word {
            font-size: 2.8rem;
            color: #104e8b;
            text-shadow: 2px 2px 0 #aad0ff;
            margin-bottom: 0.3rem;
        }

        .quiz-col .speak-btn {
            background: #ffb6d1;
            border: 3px solid white;
            font-size: 1.3rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: #b0265a;
            box-shadow: 0 4px 0 #b0265a;
            cursor: pointer;
        }

        .quiz-col .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin: 0.8rem 0;
        }

        .quiz-col .option-item {
            background: #d9f0ff;
            border: 3px solid white;
            border-radius: 25px;
            padding: 0.6rem 0.3rem;
            font-size: 1.3rem;
            color: #014182;
            box-shadow: 0 4px 0 #3d74a8;
            cursor: pointer;
            text-align: center;
        }

        .quiz-col .option-item.correct {
            background: #8bef8b;
            color: #006400;
        }

        .quiz-col .option-item.wrong {
            background: #ff8a8a;
            color: #8b0000;
        }

        .quiz-col .score-display {
            font-size: 1.3rem;
            color: #014182;
            margin: 0.5rem 0;
            text-align: center;
        }

        .quiz-col .next-btn {
            background: #1e90ff;
            border: 3px solid white;
            border-radius: 30px;
            padding: 0.4rem;
            font-size: 1.3rem;
            color: white;
            box-shadow: 0 4px 0 #0b4b8a;
            cursor: pointer;
            text-align: center;
            margin-top: 0.5rem;
        }

        /* 拼写比赛 - 横版缩小版 */
        .spelling-col .spelling-box {
            background: #e8f3ff;
            border-radius: 35px;
            padding: 1rem 0.5rem;
            border: 4px solid white;
            box-shadow: 0 8px 0 #3d74a8;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .spelling-col .meaning-hint {
            font-size: 1.4rem;
            color: #014182;
            margin-bottom: 0.3rem;
        }

        .spelling-col .speak-btn {
            background: #ffb6d1;
            border: 3px solid white;
            font-size: 1.3rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            color: #b0265a;
            box-shadow: 0 4px 0 #b0265a;
            cursor: pointer;
            margin-bottom: 0.5rem;
        }

        .spelling-col .blank-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem;
            margin: 0.5rem 0;
        }

        .spelling-col .blank-letter {
            width: 40px;
            height: 40px;
            background: white;
            border: 2px solid #0070c0;
            border-radius: 15px;
            font-size: 1.8rem;
            text-align: center;
            line-height: 36px;
            color: #014182;
        }

        .spelling-col .blank-letter.empty {
            background: #ecf7ff;
            border: 2px dashed #0070c0;
        }

        .spelling-col .letters-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            justify-content: center;
            margin: 0.5rem 0;
        }

        .spelling-col .letter-tile {
            background: #ffb6d1;
            min-width: 35px;
            padding: 0.3rem 0.5rem;
            border-radius: 20px;
            border: 2px solid white;
            font-size: 1.6rem;
            color: #b0265a;
            box-shadow: 0 3px 0 #b0265a;
            cursor: pointer;
        }

        .spelling-col .letter-tile.used {
            opacity: 0.3;
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b0265a;
            pointer-events: none;
        }

        .spelling-col .action-btn {
            background: #1e90ff;
            border: 3px solid white;
            border-radius: 25px;
            padding: 0.3rem 0.8rem;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 3px 0 #0b4b8a;
            cursor: pointer;
            display: inline-block;
            margin: 0.2rem;
        }

        .spelling-col .message {
            font-size: 1.2rem;
            color: #014182;
            margin: 0.3rem 0;
            min-height: 1.8rem;
        }

        .footer {
            text-align: center;
            margin-top: 0.8rem;
            font-size: 1.4rem;
            color: #014182;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .games-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="homepage">
        <!-- 头部 -->
        <div class="title-row">
            <div class="title-block">
                <span class="dora-icon">🐱</span>
                <h1>单词探险家</h1>
            </div>
            <div class="dora-icon">🔔</div>
        </div>

        <!-- 选择你的冒险 -->
        <div class="choose-line">
            <p>✨ 选择你的冒险 ✨</p>
            <span class="dora-bell">🔔 任意门</span>
        </div>

        <!-- 类别选择 -->
        <div class="category-wrap">
            <div class="section-label"><span>🔮</span> 选择类别</div>
            <div class="category-cloud">
                <div class="cat-item selected" data-cat="all"><span>🔤</span> 全部单词</div>
                <div class="cat-item" data-cat="numbers"><span>①</span> Numbers</div>
                <div class="cat-item" data-cat="colors"><span>🎨</span> Colors</div>
                <div class="cat-item" data-cat="family"><span>👪</span> Family</div>
                <div class="cat-item" data-cat="animals"><span>🐶</span> Animals</div>
                <div class="cat-item" data-cat="actions"><span>⚽</span> Actions</div>
            </div>
        </div>

        <!-- 横版三个游戏并排 -->
        <div class="games-row">
            <!-- 单词卡片游戏 -->
            <div class="game-col flashcard-col">
                <div class="game-header">
                    <div class="game-icon">🃏</div>
                    <div class="game-title">单词卡片</div>
                </div>
                <div class="big-card">
                    <div class="word-display" id="flashWord">one</div>
                    <div class="phonetic-hint" id="flashPhonic">[wʌn]</div>
                    <button class="speak-btn" id="speakFlashBtn">🔔 听发音</button>
                </div>
                <div class="nav-buttons">
                    <div class="nav-btn" id="prevFlashBtn">◀ 上一个</div>
                    <div class="nav-btn" id="nextFlashBtn">下一个 ▶</div>
                </div>
            </div>

            <!-- 测验模式游戏 -->
            <div class="game-col quiz-col">
                <div class="game-header">
                    <div class="game-icon">🔍</div>
                    <div class="game-title">测验模式</div>
                </div>
                <div class="question-box">
                    <div class="question-word" id="quizWord">one</div>
                    <button class="speak-btn" id="speakQuizBtn">🔔 听发音</button>
                </div>
                <div id="quizOptions" class="options-grid"></div>
                <div class="score-display" id="quizScore">得分: 0 / 0</div>
                <div class="next-btn" id="nextQuizBtn">下一题 ▶</div>
            </div>

            <!-- 拼写比赛游戏 -->
            <div class="game-col spelling-col">
                <div class="game-header">
                    <div class="game-icon">✏️</div>
                    <div class="game-title">拼写比赛</div>
                </div>
                <div class="spelling-box">
                    <div class="meaning-hint" id="spellingHint">含义: 一</div>
                    <button class="speak-btn" id="speakSpellingBtn">🔔 听发音</button>
                    <div id="spellingBlanks" class="blank-row"></div>
                    <div id="spellingLetters" class="letters-row"></div>
                    <div>
                        <span class="action-btn" id="checkSpellingBtn">✅ 检查</span>
                        <span class="action-btn" id="nextSpellingBtn">下一题 ▶</span>
                    </div>
                    <div id="spellingMessage" class="message"></div>
                </div>
            </div>
        </div>

        <div class="footer">🐱 哆啦A梦陪你学单词 · 三个游戏一起玩</div>
    </div>

    <script>
        // ==================== 全局数据 ====================
        const vocabulary = {
            all: [
                { word: 'one', phonetic: '[wʌn]', meaning: '一' },
                { word: 'two', phonetic: '[tuː]', meaning: '二' },
                { word: 'three', phonetic: '[θriː]', meaning: '三' },
                { word: 'four', phonetic: '[fɔːr]', meaning: '四' },
                { word: 'five', phonetic: '[faɪv]', meaning: '五' },
                { word: 'red', phonetic: '[red]', meaning: '红色' },
                { word: 'blue', phonetic: '[bluː]', meaning: '蓝色' },
                { word: 'cat', phonetic: '[kæt]', meaning: '猫' },
                { word: 'dog', phonetic: '[dɔːɡ]', meaning: '狗' }
            ],
            numbers: [
                { word: 'one', phonetic: '[wʌn]', meaning: '一' },
                { word: 'two', phonetic: '[tuː]', meaning: '二' },
                { word: 'three', phonetic: '[θriː]', meaning: '三' },
                { word: 'four', phonetic: '[fɔːr]', meaning: '四' },
                { word: 'five', phonetic: '[faɪv]', meaning: '五' }
            ],
            colors: [
                { word: 'red', phonetic: '[red]', meaning: '红色' },
                { word: 'blue', phonetic: '[bluː]', meaning: '蓝色' },
                { word: 'yellow', phonetic: '[ˈjeloʊ]', meaning: '黄色' },
                { word: 'green', phonetic: '[ɡriːn]', meaning: '绿色' }
            ],
            family: [
                { word: 'dad', phonetic: '[dæd]', meaning: '爸爸' },
                { word: 'mum', phonetic: '[mʌm]', meaning: '妈妈' },
                { word: 'brother', phonetic: '[ˈbrʌðər]', meaning: '兄弟' },
                { word: 'sister', phonetic: '[ˈsɪstər]', meaning: '姐妹' }
            ],
            animals: [
                { word: 'cat', phonetic: '[kæt]', meaning: '猫' },
                { word: 'dog', phonetic: '[dɔːɡ]', meaning: '狗' },
                { word: 'bird', phonetic: '[bɜːrd]', meaning: '鸟' }
            ],
            actions: [
                { word: 'jump', phonetic: '[dʒʌmp]', meaning: '跳' },
                { word: 'run', phonetic: '[rʌn]', meaning: '跑' },
                { word: 'swim', phonetic: '[swɪm]', meaning: '游泳' }
            ]
        };

        // 当前选中的类别和数据
        let currentCategory = 'all';
        let currentList = vocabulary.all;

        // 各个游戏的状态
        let flashcardIndex = 0;
        let quizIndex = 0;
        let quizScore = 0;
        let quizTotal = 0;
        let spellingIndex = 0;
        let spellingCurrentWord = '';
        let spellingCurrentLetters = [];
        let spellingFilled = [];

        // ==================== 语音功能 ====================
        function speakWord(word) {
            if (!window.speechSynthesis) return;
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.2;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }

        // ==================== 类别切换 ====================
        const catItems = document.querySelectorAll('.cat-item');
        catItems.forEach(item => {
            item.addEventListener('click', function() {
                catItems.forEach(c => c.classList.remove('selected'));
                this.classList.add('selected');
                
                currentCategory = this.getAttribute('data-cat');
                currentList = vocabulary[currentCategory] || vocabulary.all;
                
                // 重置所有游戏的状态
                flashcardIndex = 0;
                quizIndex = 0;
                quizScore = 0;
                quizTotal = 0;
                spellingIndex = 0;
                
                // 刷新所有游戏
                updateFlashcard();
                updateQuiz();
                initSpelling();
            });
        });

        // ==================== 单词卡片游戏 ====================
        const flashWord = document.getElementById('flashWord');
        const flashPhonic = document.getElementById('flashPhonic');
        
        function updateFlashcard() {
            const item = currentList[flashcardIndex];
            flashWord.textContent = item.word;
            flashPhonic.textContent = item.phonetic;
        }

        document.getElementById('speakFlashBtn').addEventListener('click', () => {
            speakWord(currentList[flashcardIndex].word);
        });

        document.getElementById('prevFlashBtn').addEventListener('click', () => {
            flashcardIndex = (flashcardIndex - 1 + currentList.length) % currentList.length;
            updateFlashcard();
        });

        document.getElementById('nextFlashBtn').addEventListener('click', () => {
            flashcardIndex = (flashcardIndex + 1) % currentList.length;
            updateFlashcard();
        });

        // ==================== 测验模式游戏 ====================
        const quizWord = document.getElementById('quizWord');
        const quizOptions = document.getElementById('quizOptions');
        const quizScoreDisplay = document.getElementById('quizScore');
        let canAnswer = true;

        function updateQuiz() {
            const item = currentList[quizIndex];
            quizWord.textContent = item.word;
            
            // 生成4个选项
            let options = [item.meaning];
            const otherMeanings = currentList
                .filter((_, idx) => idx !== quizIndex)
                .map(i => i.meaning)
                .filter((v, i, a) => a.indexOf(v) === i);
            
            while (options.length < 4 && otherMeanings.length > 0) {
                const randomIndex = Math.floor(Math.random() * otherMeanings.length);
                options.push(otherMeanings[randomIndex]);
                otherMeanings.splice(randomIndex, 1);
            }
            
            // 补充满4个
            while (options.length < 4) {
                options.push('?');
            }
            
            options.sort(() => Math.random() - 0.5);
            
            quizOptions.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('div');
                btn.className = 'option-item';
                btn.textContent = opt;
                btn.addEventListener('click', () => checkQuizAnswer(btn, opt === item.meaning));
                quizOptions.appendChild(btn);
            });
            
            canAnswer = true;
            updateQuizScore();
        }

        function checkQuizAnswer(btn, isCorrect) {
            if (!canAnswer) return;
            canAnswer = false;
            
            if (isCorrect) {
                btn.classList.add('correct');
                quizScore++;
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.option-item').forEach(opt => {
                    if (opt.textContent === currentList[quizIndex].meaning) {
                        opt.classList.add('correct');
                    }
                });
            }
            
            quizTotal++;
            updateQuizScore();
        }

        function updateQuizScore() {
            quizScoreDisplay.textContent = `得分: ${quizScore} / ${quizTotal}`;
        }

        document.getElementById('speakQuizBtn').addEventListener('click', () => {
            speakWord(currentList[quizIndex].word);
        });

        document.getElementById('nextQuizBtn').addEventListener('click', () => {
            quizIndex = (quizIndex + 1) % currentList.length;
            updateQuiz();
        });

        // ==================== 拼写比赛游戏 ====================
        const spellingHint = document.getElementById('spellingHint');
        const spellingBlanks = document.getElementById('spellingBlanks');
        const spellingLetters = document.getElementById('spellingLetters');
        const spellingMessage = document.getElementById('spellingMessage');

        function initSpelling() {
            const item = currentList[spellingIndex];
            spellingHint.textContent = `含义: ${item.meaning}`;
            spellingCurrentWord = item.word;
            spellingFilled = new Array(item.word.length).fill('');
            
            let letters = item.word.split('');
            const extras = ['a', 'e', 'i', 'o', 'u', 'b', 'c', 'p'];
            for (let i = 0; i < 2; i++) {
                letters.push(extras[Math.floor(Math.random() * extras.length)]);
            }
            spellingCurrentLetters = letters.sort(() => Math.random() - 0.5);
            
            renderSpelling();
            spellingMessage.textContent = '';
        }

        function renderSpelling() {
            let blanksHtml = '';
            for (let i = 0; i < spellingCurrentWord.length; i++) {
                blanksHtml += `<div class="blank-letter empty" data-pos="${i}"></div>`;
            }
            spellingBlanks.innerHTML = blanksHtml;
            
            let lettersHtml = '';
            spellingCurrentLetters.forEach((letter, idx) => {
                lettersHtml += `<div class="letter-tile" data-letter="${letter}" data-idx="${idx}">${letter}</div>`;
            });
            spellingLetters.innerHTML = lettersHtml;
            
            document.querySelectorAll('.letter-tile').forEach(tile => {
                tile.addEventListener('click', letterClickHandler);
            });
        }

        function letterClickHandler(e) {
            const tile = e.currentTarget;
            if (tile.classList.contains('used')) return;
            
            const letter = tile.dataset.letter;
            const blanks = document.querySelectorAll('#spellingBlanks .blank-letter');
            
            for (let i = 0; i < blanks.length; i++) {
                if (!blanks[i].textContent) {
                    blanks[i].textContent = letter;
                    blanks[i].classList.remove('empty');
                    spellingFilled[i] = letter;
                    tile.classList.add('used');
                    break;
                }
            }
        }

        document.getElementById('speakSpellingBtn').addEventListener('click', () => {
            speakWord(spellingCurrentWord);
        });

        document.getElementById('checkSpellingBtn').addEventListener('click', () => {
            const guessed = spellingFilled.join('');
            if (guessed === spellingCurrentWord) {
                spellingMessage.textContent = '🎉 正确！';
                speakWord(spellingCurrentWord);
            } else {
                spellingMessage.textContent = '😿 再试试';
            }
        });

        document.getElementById('nextSpellingBtn').addEventListener('click', () => {
            spellingIndex = (spellingIndex + 1) % currentList.length;
            initSpelling();
        });

        // ==================== 初始化 ====================
        updateFlashcard();
        updateQuiz();
        initSpelling();
    </script>
</body>
</html>
